<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ramya: Digital Neighbour</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='image.png') }}">
    <style>
        body {
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background-color: #1e293b;
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            display: inline-block;
            border-radius: 50%;
            object-fit: cover;
        }

        .brand-name {
            font-size: 2.25rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .brand-tagline {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        .welcome-text {
            color: #cbd5e1;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #334155;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-field {
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .login-btn {
            background-color: #ffffff;
            color: #0f172a;
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .login-btn:hover {
            background-color: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #475569;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid #22c55e;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='image.png') }}" class="brand-icon" alt="App Icon">
        <h1 class="brand-name">Ramya</h1>
        <p class="brand-tagline">Your Digital Neighbour</p>

        <p class="welcome-text">
            Step back into your digital neighborhood.<br>
            Your conversations are waiting.
        </p>

        <div class="tab-buttons">
            <button type="button" class="tab-btn active" id="login-tab" onclick="showTab('login')">Login</button>
            <button type="button" class="tab-btn" id="register-tab" onclick="showTab('register')">Register</button>
        </div>

        <div id="message-container"></div>

        <!-- Login Form -->
        <form id="login-form" method="POST" action="">
            <input type="text" name="username" placeholder="Username" required class="input-field"
                autocomplete="username">
            <input type="password" name="password" placeholder="Password" required class="input-field"
                autocomplete="current-password">
            <button type="submit" class="login-btn">Login</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden" method="POST">
            <input type="text" name="username" placeholder="Username (min 3 chars)" required class="input-field"
                autocomplete="username" minlength="3" pattern="[a-zA-Z0-9_]+">
            <input type="password" name="password" placeholder="Password (min 6 chars)" required class="input-field"
                autocomplete="new-password" minlength="6">
            <input type="email" name="email" placeholder="Email (optional)" class="input-field" autocomplete="email">
            <button type="submit" class="login-btn">Register</button>
        </form>

        <p class="footer-note">Secure password-based authentication</p>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('register-tab').classList.toggle('active', tab === 'register');
            document.getElementById('message-container').innerHTML = '';
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
        }

        // Handle Register Form Submit
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showMessage(result.message, 'success');
                    setTimeout(() => showTab('login'), 1500);
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (err) {
                showMessage('Registration failed. Please try again.', 'error');
            }
        });

        // Handle Login Form Submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    window.location.href = '/home';
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (err) {
                showMessage('Login failed. Please try again.', 'error');
            }
        });
    </script>
</body>

</html>
