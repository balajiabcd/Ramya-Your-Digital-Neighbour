services:
  - type: web
    name: ramya-bot
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: Production
      - key: PORT
        value: 8080
      - key: CHROMADB_PATH
        value: /app/ramya_memory_db
    # Persistent Disk (Optional: Needs "Starter" plan or higher)
    # disk:
    #   name: ramya-data
    #   mountPath: /app/ramya_memory_db
    #   sizeGB: 1
